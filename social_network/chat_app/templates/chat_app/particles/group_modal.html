{% load static %}
<div id="group-modal" class="group-modal" hidden>
    <div class="group-modal__box">
        <div id="group-step-users">
            <img src="{% static 'images/cross.svg' %}" id="close-group-modal" class="group-modal__close" alt="">
            <h2 class="new-group">Нова група</h2>
            <div class="group-search-wrapper">
                <img class="group-search-icon" src="{% static 'chat_app/images/loupe.svg' %}" alt="">
                <input class="search-users" type="text" placeholder="Пошук">
            </div>
            <p class="user-count">Вибрано: <span id="selected-count">0</span></p>
            <p id="group-error" class="group-error" hidden></p>
            <div class="group-friends">
                {% for friend in friends %}

                    {% ifchanged friend.username.0|upper %}
                        <div class="friends-letter">
                            {{ friend.username.0|upper }}
                        </div>
                    {% endifchanged %}
                    
                    <label class="group-friend">
                        <input class="group-user-checkbox" type="checkbox" value="{{ friend.id }}" data-user-name="{{ friend.username }}">
                    
                        <span class="friend-username">
                            {{ friend.username }}
                        </span>
                    
                        <img class="group-username-img" src="{% static 'home_app/images/person_4.svg' %}" alt="">
                    </label>
                
                {% endfor %}
            </div>
            <div class="group-modal__actions">
                <button class="group-cencel-btn" id="cancel-group-modal" type="button">Скасувати</button>
                <button class="group-next-btn" id="next-group-step" type="button">Далі</button>
            </div>
        </div>
        <div id="group-step-name" hidden> 
            <img src="{% static 'images/cross.svg' %}" id="close-group-name-modal" class="group-modal__close" alt="">
            <h2 class="new-group">Нова група</h2>
            <div class="group-name-div">
                <p for="group-name" class="group-name">Назва</p>
                <input id="group-name" class="group-name-input" type="text" placeholder="Введіть назву">
            </div>
            <div class="group-photo-div">
                <img class="group-img" src="{% static 'home_app/images/person_4.svg' %}" alt="">
                <div class="group-photo-actions">
                    <div class="add-group-photo">
                        <img class="add-group-img" src="{% static 'chat_app/images/add-group-photo.svg' %}" alt="">
                        <span>Додайте фото</span>
                    </div>
                    <div class="select-group-photo">
                        <img class="select-group-img" src="{% static 'chat_app/images/choose-group-photo.svg' %}" alt="">
                        <span>Оберіть фото</span>
                    </div>
                </div>
            </div>
            <p class="participants">Учасники</p>
            <div class="list-participants" id="selected-users-list">
            </div>
            <div class="group-modal__actions">
                <button class="back-group-step" id="back-group-step" type="button">Назад</button>
                <button class="create-group" id="create-group" type="button">Створити групу</button>
            </div>
        </div>
    </div>
</div>
