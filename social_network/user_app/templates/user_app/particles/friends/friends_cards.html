{% load static %}
{% for person in users %}
    <div class="friend-card">
        <div class="user-card-div">
            <img src="{% static 'home_app/images/person_2.svg' %}" alt="">
            <h3>@{{ person.username }}</h3>
        </div>
        
        <div class="buttons-card-div">
            <button>Підтвердити</button>
            <button>Видалити</button>
        </div>
    </div>
{% empty %}
    <p>Порожньо</p>
{% endfor %}
