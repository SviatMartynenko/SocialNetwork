{% load static %}
<div class="register-div">
    <div class="register-title">
        <span class = "register-text form-title-border">Реєстрація</span>
        <span class = "register-login-text">Авторизація</span>
    </div>
    <div class = "register-message">
        <p>Приєднуйся до World IT</p>
    </div>
    <form class="register-form" action="{% url 'register' %}" method="post">
        <div class= "input-containers">
            <div class = "form-input-container">
                <span class = "form-input-label">{{ form_register.email.label }}</span>
                <div class = "form-input-field-container">
                    {{ form_register.email }}
                </div>
                <p class = "register-email-error error"></p>
            </div>
                <div class = "form-input-container">
                    <span class = "form-input-label">{{ form_register.password1.label }}</span>
                <div class = "form-input-field-container">
                    {{ form_register.password1 }}
                    <div class="eye-img-container">
                        <img class="img-cover eye" eye-open-src = "{% static 'user_app/images/eye_open.svg'%}" eye-close-src = "{% static 'user_app/images/eye_close.svg'%}" src = "{% static 'user_app/images/eye_close.svg'%}" alt="">
                    </div>
                </div>  
            </div>
            <div class = "form-input-container">
                <span class = "form-input-label">{{ form_register.password2.label }}</span>
                <div class = "form-input-field-container">
                    {{ form_register.password2 }}
                    <div class="eye-img-container">
                        <img class="img-cover eye" eye-open-src = "{% static 'user_app/images/eye_open.svg'%}" eye-close-src = "{% static 'user_app/images/eye_close.svg'%}" src = "{% static 'user_app/images/eye_close.svg'%}" alt="">
                    </div>
                </div>
                <p class = "register-password-error error"></p>
            </div>
        </div>
        
        <button class="register-button" type="submit">Створити акаунт</button>
    </form>
</div>
